# =========================================================
# DOCKER COMPOSE ORCHESTRATION CONFIGURATION
# =========================================================

services:
  # --- Backend API Service ---
  backend:
    # Build configuration for the FastAPI application.
    build:
      # Build context is the root directory.
      context: .
      # Specifies the custom Dockerfile for backend.
      dockerfile: Dockerfile.backend
    
    # Map container's exposed port 8000 to the host's port 8000.
    # This allows clients (like developers and the frontend container) to query the API directly if needed.
    ports:
      - "8000:8000"
    
    # Load environment variables from the '.env' file in the root directory.
    # This avoids hardcoding secrets like API keys or JWT secret keys.
    env_file:
      - .env
    
    # Mount persistent named volumes.
    # We map local folders inside the container to persistent volumes so data survives container restarts.
    volumes:
      # Uploaded PDF files directory.
      - uploads_data:/app/uploads
      # SQLite database directory containing conversations/users database.
      - sqlite_data:/app/database
      # ChromaDB persistent collection directory for vector embeddings.
      - chroma_data:/app/chroma_db

  # --- Frontend Web Service ---
  frontend:
    # Build configuration for the React application.
    build:
      # Build context is set to the frontend folder.
      context: ./frontend
      # Specifies the path to the Dockerfile.frontend (relative to the build context).
      dockerfile: ../Dockerfile.frontend
      # Pass build arguments dynamically from the environment.
      # Since React builds static JS/HTML assets, these must be injected during image build.
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
    
    # Map Nginx port 80 inside the container to port 80 on the host machine.
    # Users will access the web application at http://localhost.
    ports:
      - "80:80"
    
    # Ensures the backend starts up before the frontend starts building or running.
    depends_on:
      - backend

# --- Named Volumes Definitions ---
# These volumes are managed by Docker and stored outside the containers' file system.
# This prevents data loss when containers are deleted or recreated.
volumes:
  uploads_data:
  sqlite_data:
  chroma_data:
